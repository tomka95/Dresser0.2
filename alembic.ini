# Alembic configuration for Tailor.
#
# The database URL is NOT stored here. It is resolved at runtime from the
# application's own configuration (app/db.py -> _build_database_url), so Alembic
# and the app always agree on which database they target, and no credentials are
# committed to source control.

[alembic]
script_location = alembic
prepend_sys_path = .
# Versioned migration files; timestamped + slug for readable ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
