# Railway config-as-code -- API service (uvicorn).
#
# Railway cannot define two services in one file. Create BOTH services from
# this same repo, then point each service at its own config file under
# Service -> Settings -> Config-as-code:
#   api    -> railway.api.toml   (this file)
#   worker -> railway.worker.toml
# Full runbook + env manifest: docs/railway-deploy.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Backend-only rebuild triggers: commits that touch only apps/web (Vercel's)
# or docs do not redeploy this service.
watchPatterns = [
  "app/**",
  "main.py",
  "alembic/**",
  "alembic.ini",
  "scripts/**",
  "requirements.txt",
  "requirements.lock.txt",
  "Dockerfile",
  "railway.api.toml",
]

[deploy]
# 1 worker on 1 replica: each worker lazy-loads the ~176MB u2net matting model
# on its first cutout, so >1 worker multiplies that RAM footprint (OOM risk on
# a small instance). 1 worker also makes the two in-process rate limiters
# (POST /events, monetization clicks -- SCRUM-67) exact instead of x2 --
# move them to Postgres/Redis before raising workers or replicas any further.
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --proxy-headers --forwarded-allow-ips '*'"
healthcheckPath = "/health"    # main.py -- no auth, no DB round-trip
healthcheckTimeout = 120       # seconds for a fresh deploy to report healthy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1                # SCRUM-67: do NOT scale >1 until the in-memory limiters move to a shared store
sleepApplication = false       # always-on
# EU-West (Amsterdam) -- the Railway region closest to the Supabase Frankfurt
# DB (~7ms). If your plan/UI rejects this id, delete the line and set the
# region in the service's dashboard settings instead.
region = "europe-west4-drams3a"
